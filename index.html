<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vork.global</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window>" error
      // This happens when certain libraries try to polyfill fetch in an environment
      // where window.fetch is a read-only getter.
      if (typeof window.global === 'undefined') {
        window.global = window;
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
